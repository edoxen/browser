name: release

on:
  push:
    tags: ['v*']
  workflow_dispatch:
    inputs:
      package:
        description: 'Package to publish (only @edoxen/browser is supported from this repo)'
        required: false
        default: '@edoxen/browser'

# Trusted publishing via npm provenance. Mirrors the verified-working
# edoxen-js release.yml (PR #7) — repo must be public for provenance.
#   * id-token: write (required for OIDC)
#   * NO NODE_AUTH_TOKEN (suppresses OIDC)
#   * actions/setup-node@v5 (v6 has OIDC issues; v5 is the proven combo)
#   * node-version 24
#   * NO registry-url on setup-node (writes empty _authToken in .npmrc
#     which prevents OIDC fallback)
#   * npm publish --provenance (NOT pnpm publish)
#   * NO --access flag: publishConfig.access = public in package.json
permissions:
  contents: read
  id-token: write

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v5
        with:
          node-version: '24'
          cache: pnpm

      - run: pnpm install --frozen-lockfile
      - run: pnpm typecheck
      - run: pnpm test
      - run: pnpm -F @edoxen/browser build:cli

      - name: Publish @edoxen/browser
        working-directory: packages/browser
        run: npm publish --provenance
