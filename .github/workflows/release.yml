name: release

on:
  push:
    tags: ['v*']
  workflow_dispatch:
    inputs:
      package:
        description: 'Package to publish (only @edoxen/browser is supported from this repo)'
        required: false
        default: '@edoxen/browser'

# Trusted publishing via npm provenance:
#   - Configure the trusted publisher on npmjs.com for @edoxen/browser
#     pointing at this workflow file.
#   - GitHub provides the OIDC token; npm verifies it.
#   - No NPM_TOKEN secret required once trusted publishing is configured.
permissions:
  contents: read
  id-token: write

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: pnpm/action-setup@v4
        with:
          version: 9
      - uses: actions/setup-node@v4
        with:
          node-version-file: '.nvmrc'
          cache: pnpm
          registry-url: 'https://registry.npmjs.org'

      - run: pnpm install --frozen-lockfile
      - run: pnpm typecheck
      - run: pnpm test
      - run: pnpm -F @edoxen/browser build:cli

      - name: Publish @edoxen/browser (provenance)
        run: pnpm -F '@edoxen/browser' publish --access public --no-git-checks --provenance
        env:
          # Legacy token kept for fallback; remove once trusted publishing is
          # confirmed working on npmjs.com.
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
