'about.title': 'À propos'
'about.subtitle': 'Une archive numérique de {count} {records} — {committee}, de {year} à aujourd''hui.'
'about.format': 'Format Edoxen'
'about.formatBody': 'Ce site affiche les données de réunions et de décisions selon le modèle d''information Edoxen — un schéma YAML pour les actes officiels des organismes de normalisation.'
'about.formatBody2': 'Chaque fichier comporte un bloc de métadonnées (titre, date, source, lieu) suivi d''un tableau de décisions. Chaque décision possède un identifiant structuré (préfixe + numéro), un genre (résolution, ordre, décision), des localisations par langue, ainsi que les considérations, actions et approbations qui composent son dossier.'
'about.actionTypesTitle': 'Types d''actions'
'about.actionTypesBody': 'Chaque résolution enregistre des actions typées — ce que le comité a décidé de faire. Ce vocabulaire rend les archives filtrables et analysables sur des décennies.'
'about.using': 'Utilisation du site'
'about.usingDecisions': 'Décisions — consulter l''archive des résolutions.'
'about.usingMeetings': 'Réunions — voir les réunions et leurs ordres du jour, procès-verbaux et décisions adoptées.'
'about.usingUrns': 'URN — chaque entité possède une URN stable pour la citation.'
