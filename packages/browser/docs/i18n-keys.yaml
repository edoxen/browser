# Edoxen Browser — UI Translation Keys
#
# This file documents every translatable UI string in @edoxen/browser.
# Copy the block for your language, fill in the values, and pass it
# via `uiStrings` in edoxen.config.ts:
#
#   export default defineConfig({
#     locales: [
#       { code: 'eng', label: 'English', routePrefix: '' },
#       { code: 'deu', label: 'Deutsch', routePrefix: '/deu' },
#     ],
#     uiStrings: {
#       deu: {
#         'nav.home': 'Startseite',
#         'nav.decisions': 'Beschlüsse',
#         # ... fill in the keys below
#       },
#     },
#   })
#
# Keys not provided in uiStrings fall back to English automatically.
# Built-in languages (eng, fra, zho, spa, ara, rus) ship with full
# translations; custom languages need only the keys you want overridden.
#
# Locale codes use ISO 639-2/639-3 (3-letter): deu, eng, fra, jpn, zho, etc.
# Set `rtl: true` on a locale entry for right-to-left languages.
#
# Note: to rename "decisions"/"meetings" in English UI strings you
# usually want the `terminology` config instead of per-key overrides —
# see the README's Terminology section.

